<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Javascriptzão</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; transition: 0.3s; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; background: #333; color: white;}
    </style>
</head>
<body>
    <h1 id="titulo">Olá, Mundo!</h1>
    <button onclick="fazerMagica()">Clica aqui!</button>

    <script>
        // Aqui entra o seu JS!
        function fazerMagica() {
            const cores = ['#FF5733', '#33FF57', '#3357FF', '#F333FF', '#FFC300'];
            const corAleatoria = cores[Math.floor(Math.random() * cores.length)];
            
            document.body.style.backgroundColor = corAleatoria;
            document.getElementById('titulo').innerText = "JavaScript em ação! IHUUL 🚀";
            document.getElementById('titulo').style.color = "white";
        }
    </script>
</body>
</html>
